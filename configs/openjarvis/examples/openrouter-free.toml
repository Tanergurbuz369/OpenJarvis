# OpenRouter (free cloud models) — no local GPU, no Ollama required
# Copy to ~/.openjarvis/config.toml
#
# This routes OpenJarvis through OpenRouter, giving access to 70+ hosted
# models. The models below are OpenRouter's *free* tier (":free" suffix),
# so you can run the full stack without a local model or paid API.
#
# Setup (one time):
#   1. Create a key at https://openrouter.ai/keys
#   2. Export it so OpenJarvis can find it:
#        export OPENROUTER_API_KEY="sk-or-..."
#      (add the line to ~/.bashrc / ~/.zshrc to make it persistent)
#   3. Use this config:
#        jarvis ask "Explain quantum computing" --config openrouter-free.toml
#      or copy it to ~/.openjarvis/config.toml and just run `jarvis ask ...`.
#
# NOTE: OpenRouter's free model catalog changes over time and free models are
# rate-limited. Browse the current free list (price = $0) here:
#   https://openrouter.ai/models?max_price=0
# Model IDs use OpenRouter's "org/model:free" format upstream, but must be
# prefixed with "openrouter/" here — CloudEngine only routes to OpenRouter
# when it sees that prefix (see engine.cloud._is_openrouter_model). Without
# it, e.g. an id containing "claude" is misdetected as a direct Anthropic
# model and fails unless you also have ANTHROPIC_API_KEY set.

[engine]
default = "cloud"                   # no local engine required for this preset

[intelligence]
# A strong, free general/coding model. Swap for any ":free" model you prefer.
default_model = "openrouter/deepseek/deepseek-chat-v3-0324:free"
# Other good free options (uncomment one):
# default_model = "openrouter/deepseek/deepseek-r1:free"                     # reasoning
# default_model = "openrouter/meta-llama/llama-3.3-70b-instruct:free"        # general
# default_model = "openrouter/qwen/qwen-2.5-coder-32b-instruct:free"         # coding
# default_model = "openrouter/google/gemini-2.0-flash-exp:free"             # fast, long context
# default_model = "openrouter/mistralai/mistral-small-3.1-24b-instruct:free"
temperature = 0.7
max_tokens = 2048

[agent]
default_agent = "simple"           # single-turn chat; use "native_openhands" for tool use

[server]
host = "0.0.0.0"
port = 8000
